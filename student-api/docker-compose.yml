version: "3.9"

services:
  student-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: student_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: students_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "student_user", "-d", "students_db"]
      interval: 5s  
      retries: 5
    networks:
      - student-network

  student-api-1:
    build: .
    container_name: student-api-1
    depends_on:
      - student-db
    networks:
      - student-network
    env_file:
      - .env
    # volumes:
    #   - .:/app  # hot reload (optional for dev)
    #   - /app/venv  # persist virtual environment
    command: 
      - /app/entrypoint.sh

  student-api-2:
    build: .
    container_name: student-api-2
    depends_on:
      - student-db
    networks:
      - student-network
    env_file:
      - .env
    command: 
      - /app/entrypoint.sh

  nginx:
    image: nginx:stable-alpine

    container_name: student-nginx

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - student-api-1
      - student-api-2

    networks:
      - student-network

volumes:
  postgres_data:

networks:
  student-network: