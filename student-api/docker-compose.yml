version: "3.9"

services:
  student-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: student_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: students_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  student-api:
    build: .
    depends_on:
      - student-db
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # hot reload (optional for dev)
    command: 
      - sh /app/entrypoint.sh
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "student_user"]
      interval: 5s
      retries: 5

volumes:
  postgres_data: