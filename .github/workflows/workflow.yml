name: CI Pipeline

on:
  push:
    branches: [feature/**]
    paths:
      - 'student-api/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'student-api/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  CI: true
  DATABASE_URL: postgresql://student_user:password123@localhost:5432/students_db
  IMAGE_NAME: student-api

defaults:
  run:
    shell: bash

jobs:

# ================= LINT =================
  lint:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4

      - name: Cache uv
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: | 
            ~/.cache/uv
            student-api/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install deps
        run: uv sync --locked

      - name: Lint
        run: make ci-lint


# ================= TEST =================
  test:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: student-api

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: student_user
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: students_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U student_user -d students_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Cache uv
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: | 
            ~/.cache/uv
            student-api/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install deps
        run: uv sync --locked

      - name: Test
        run: make ci-test


# ================= BUILD =================
  build:
    runs-on: self-hosted
    needs: [lint, test]
    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      # Make image portable across jobs (important!)
      - name: Save image
        run: docker save $IMAGE_NAME:${{ github.sha }} -o image.tar

      # - name: Upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: image
      #     path: student-api/image.tar


# ================= VERIFY =================
  verify:
    runs-on: self-hosted
    needs: build
    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4

      - name: Download image
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: image

      - name: Load image
        if: ${{ !env.ACT }}
        run: docker load -i image.tar

      - name: Cache uv
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: | 
            ~/.cache/uv
            student-api/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Smoke test
        run: make ci-smoke

      - name: Dependency scan
        run: uvx pip-audit

      - name: Container scan
        if: ${{ !env.ACT }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH


# ================= PUBLISH =================
  publish:
    runs-on: self-hosted
    needs: verify
    # if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4

      # ---- Handle ACT vs GitHub artifact difference ----
      - name: Download image (GitHub only)
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: image

      - name: Load image (GitHub only)
        if: ${{ !env.ACT }}
        run: docker load -i image.tar

      # ---- For ACT: assume image already exists locally ----
      - name: Verify image exists (ACT)
        if: ${{ env.ACT }}
        run: docker images | grep $IMAGE_NAME

      # ---- Docker login ----
      - name: Docker login
        if: ${{ !env.ACT }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      # ---- Tagging strategy (IMPORTANT) ----
      - name: Tag image
        run: |
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            docker tag $IMAGE_NAME:${{ github.sha }} \
              ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}
          else
            echo "Skipping tag (no Docker username - likely ACT)"
          fi

      # ---- Push ----
      - name: Push image
        if: ${{ !env.ACT }}
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest