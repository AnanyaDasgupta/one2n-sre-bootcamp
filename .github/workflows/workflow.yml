name: CI Pipeline

on:
  push:
    branches: [feature/**]
    paths:
      - "app/**"
      - "alembic/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "entrypoint.sh"

  pull_request:
    paths:
      - "app/**"
      - "alembic/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "entrypoint.sh"

  workflow_dispatch:

env:
  CI: true
  DATABASE_URL: postgresql://student_user:password123@localhost:5432/students_db

# ---------- reusable uv install ----------
defaults:
  run:
    shell: bash

jobs:

  # ================= LINT =================
  lint:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4

      - name: Cache uv
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --locked

      - name: Run lint
        run: make ci-lint


  # ================= TEST =================
  test:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: student-api

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: student_user
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: students_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U student_user -d students_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      
      - name: Cache uv
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: make ci-test


  # ================= BUILD =================
  build:
    runs-on: self-hosted
    needs: [lint, test]
    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: make ci-build


  # ================= VERIFY =================
  verify:
    runs-on: self-hosted
    needs: build
    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4

      - name: Cache uv
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run smoke test (fast fail-safe)
        run: |
          set -e
          make ci-smoke

      - name: Dependency security scan
        run: uvx pip-audit

      - name: Container scan
        if: ${{ !env.ACT }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: student-api:v1.2.0
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH