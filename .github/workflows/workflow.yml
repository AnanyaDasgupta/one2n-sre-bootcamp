name: CI Pipeline

on:
  push:
    branches: [feature/**]
    paths:
      - 'student-api/**'
      - '.github/workflows/**'

  pull_request:
    paths:
      - 'student-api/**'
      - '.github/workflows/**'

  workflow_dispatch:

env:
  CI: true
  DATABASE_URL: postgresql://student_user:password123@localhost:5432/students_db
  IMAGE_NAME: student-api

defaults:
  run:
    shell: bash

jobs:

# =========================================================
# LINT
# =========================================================
  lint:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4

      - name: Cache uv
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            student-api/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('student-api/uv.lock') }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --locked

      - name: Run lint checks
        run: make ci-lint


# =========================================================
# HADOLINT
# =========================================================
  hadolint:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: student-api/Dockerfile


# =========================================================
# TEST
# =========================================================
  test:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: student-api

    services:
      postgres:
        image: postgres:15

        env:
          POSTGRES_USER: student_user
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: students_db

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U student_user -d students_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Cache uv
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            student-api/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('student-api/uv.lock') }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: make ci-test


# =========================================================
# VERSION
# =========================================================
  version:
    runs-on: self-hosted

    permissions:
      contents: write

    outputs:
      version: ${{ steps.semver.outputs.new-version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: RichardInnocent/semantic-versioning-git@v0.0.2


# =========================================================
# BUILD
# =========================================================
  build:
    runs-on: self-hosted

    needs:
      - lint
      - hadolint
      - test
      - version

    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          make ci-build TAG=${{ github.sha }}

      - name: Save Docker image
        run: |
          docker save $IMAGE_NAME:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: image
          path: student-api/image.tar


# =========================================================
# VERIFY
# =========================================================
  verify:
    runs-on: self-hosted

    needs:
      - build
      - version

    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: image

      - name: Load Docker image
        if: ${{ !env.ACT }}
        run: |
          docker load -i image.tar

      - name: Cache uv
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            student-api/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('student-api/uv.lock') }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Smoke test
        run: |
          make ci-smoke TAG=${{ github.sha }}

      - name: Dependency vulnerability scan
        run: |
          uvx pip-audit

      - name: Container vulnerability scan
        if: ${{ !env.ACT }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH


# =========================================================
# PUBLISH
# =========================================================
  publish:
    runs-on: self-hosted

    needs:
      - verify
      - version

    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    defaults:
      run:
        working-directory: student-api

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download image artifact
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: image

      - name: Load Docker image
        if: ${{ !env.ACT }}
        run: |
          docker load -i image.tar

      - name: Verify image exists (ACT)
        if: ${{ env.ACT }}
        run: |
          docker images | grep $IMAGE_NAME

      - name: Docker login
        if: ${{ !env.ACT }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Tag Docker image
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ needs.version.outputs.version }}

          docker tag $IMAGE_NAME:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

      - name: Push Docker image
        if: ${{ !env.ACT }}
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ needs.version.outputs.version }}

          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest